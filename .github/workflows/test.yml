name: Test
on:
  push:
  workflow_dispatch:

jobs:
  test:
    name: 'Test: Node.js ${{ matrix.node-version }}'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22.x', '24.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm test

  build:
    name: 'Build'
    needs: [test]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
